name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Android APK
        uses: firebelley/godot-export@v5.4.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tzp
          relative_project_path: ./
          cache: true
          export_debug: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-rpg-android
          path: ./*.apk
          if-no-files-found: warn

      - name: Upload all exports
        uses: actions/upload-artifact@v4
        with:
          name: fitness-rpg-exports
          path: ./*export*/
          if-no-files-found: warn
