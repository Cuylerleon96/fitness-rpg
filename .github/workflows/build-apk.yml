name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "fitness-rpg"

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses
          echo "=== Verify ==="
          ls -la "$ANDROID_HOME/platform-tools/adb"
          ls -la "$ANDROID_HOME/build-tools/34.0.0/aapt2"
          ls -la "$ANDROID_HOME/build-tools/34.0.0/apksigner"
          ls -la "$ANDROID_HOME/build-tools/34.0.0/zipalign"
          ls -la "$ANDROID_HOME/platforms/android-34/android.jar"
          ls -la "$JAVA_HOME/bin/java"
          ls -la "$JAVA_HOME/bin/javac"

      - name: Download Godot
        run: |
          mkdir -p ~/godot
          cd ~/godot
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          echo "$HOME/godot" >> $GITHUB_PATH

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cd ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -o templates.tpz
          mv templates/* . 2>/dev/null || true
          ls -la android_debug.apk
          echo "Template size: $(du -h android_debug.apk | cut -f1)"

      - name: Create debug keystore
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkeypair -v \
            -keystore ~/.local/share/godot/keystores/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
          echo "Keystore created:"
          ls -la ~/.local/share/godot/keystores/debug.keystore

      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/debug_keystore = \"$HOME/.local/share/godot/keystores/debug.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > ~/.config/godot/editor_settings-4.3.tres
          echo "--- Editor settings ---"
          cat ~/.config/godot/editor_settings-4.3.tres

      - name: Patch export_presets for CI
        run: |
          sed -i "s|keystore/debug=.*|keystore/debug=\"${HOME}/.local/share/godot/keystores/debug.keystore\"|" export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg

      - name: Import project
        run: |
          cd ${{ github.workspace }}
          Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --import --verbose 2>&1 | tail -20

      - name: Export APK (verbose)
        run: |
          cd ${{ github.workspace }}
          mkdir -p export
          Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --verbose --export-debug "Android" export/${EXPORT_NAME}.apk 2>&1
          echo "---"
          ls -la export/${EXPORT_NAME}.apk 2>/dev/null && echo "APK EXPORTED!" || echo "APK NOT FOUND"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fitness-rpg-android
          path: export/fitness-rpg.apk
          if-no-files-found: error
