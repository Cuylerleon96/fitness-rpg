name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: fitness-rpg

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/debug_keystore = \"$HOME/.local/share/godot/keystores/debug.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > ~/.config/godot/editor_settings-4.tres

      - name: Create debug keystore
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkeypair -v \
            -keystore ~/.local/share/godot/keystores/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"

      - name: Patch export presets for CI
        run: |
          sed -i "s|keystore/debug=.*|keystore/debug=\"${HOME}/.local/share/godot/keystores/debug.keystore\"|" export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg

      - name: Import project
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          ln -sf /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true
          godot --headless --import 2>&1 || true

      - name: Export APK
        run: |
          mkdir -p export
          godot --headless --verbose --export-debug "Android" export/${EXPORT_NAME}.apk 2>&1
          ls -la export/${EXPORT_NAME}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-rpg-android
          path: export/fitness-rpg.apk
          if-no-files-found: error
